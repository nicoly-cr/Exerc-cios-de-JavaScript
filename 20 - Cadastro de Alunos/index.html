<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <title>JavaScript - Cadastro de Alunos</title>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>

        <h2>Cadastro de Alunos</h2>

        <input type="text" id="nome" placeholder="Nome Completo">
        <input type="text" id="telefone" placeholder="Telefone (99)99999-9999" oninput="mascaraTelefone(this)" maxlength="14">
        <input type="text" id="email" placeholder="Email">
        <input type="text" id="cpf" placeholder="CPF (somente números)" oninput="mascaraCPF(this)" maxlength="14">

        <button onclick="cadastrarAluno()">Cadastrar</button>

        <h3>Lista de Alunos</h3>
        <ul id="listaAlunos"></ul>

        <script src="index.js"></script>

    </body>
</html>
